services:
  - type: web
    name: kaasu-creator
    runtime: java
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -Xmx400m -Xms128m -jar target/kaasu-creator-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: DATABASE_URL
        value: jdbc:postgresql://db.plqgzkbkowfzcyuzefop.supabase.co:5432/postgres?sslmode=require
      - key: DATABASE_USERNAME
        value: postgres
      - key: DATABASE_PASSWORD
        sync: false
