services:
  - type: web
    name: kaasu-creator
    runtime: java
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -Xmx400m -Xms128m -jar target/kaasu-creator-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: "21"
      - key: DATABASE_URL
        value: jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require
      - key: DATABASE_USERNAME
        value: postgres.plqgzkbkowfzcyuzefop
      - key: DATABASE_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: THYMELEAF_CACHE
        value: "true"
      - key: SHOW_ERRORS
        value: "never"
      - key: LOG_LEVEL
        value: "WARN"
