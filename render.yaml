    name: kaasu-creator
    runtime: java
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/kaasu-creator-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        value: jdbc:postgresql://db.plqgzkbkowfzcyuzefop.supabase.co:5432/postgres?sslmode=require
