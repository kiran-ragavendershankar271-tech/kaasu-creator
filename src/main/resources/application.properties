spring.application.name=kaasu-creator
# Render sets PORT automatically; fallback to 9093 for local dev
server.port=${PORT:9093}

# ── Supabase PostgreSQL ──────────────────────────────────────────
# Set DATABASE_URL and DATABASE_PASSWORD as environment variables
# in Render dashboard (or locally via IDE run config)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.plqgzkbkowfzcyuzefop.supabase.co:5432/postgres?sslmode=require&ssl=true}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:ragavender@04}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool — keep small for Supabase free tier (max 60 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Disable Spring Boot's auto SQL initialization (DatabaseInitializer handles it)
spring.sql.init.mode=never

# Thymeleaf — cache off in dev, Render sets THYMELEAF_CACHE=true via env
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# Gemini AI API — get a free key at https://aistudio.google.com
gemini.api.key=YOUR_GEMINI_API_KEY

# Error page (development only — remove in production)
server.error.include-message=always
server.error.include-stacktrace=always

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.kaasu_creator=DEBUG
