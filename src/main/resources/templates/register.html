<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Kaasu Creator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width:400px;margin:60px auto;">
            <!-- Kaasu-chan greeting -->
            <div style="text-align:center;margin-bottom:20px;">
                <div style="font-size:3rem;">🌸</div>
                <h2 style="color:var(--accent-pink);">Join Kaasu Creator!</h2>
                <p style="color:var(--text-secondary);">Create your account and start tracking</p>
            </div>

            <!-- Error message -->
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Success message -->
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <!-- Registration form -->
            <form action="#" th:action="@{/register}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" required placeholder="Sakura Tanaka">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="sakura@email.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="At least 6 characters">
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;">
                    Create Account
                </button>
            </form>

            <p style="text-align:center;margin-top:20px;color:var(--text-secondary);">
                Already have an account? <a href="/login" style="color:var(--accent-cyan);">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
