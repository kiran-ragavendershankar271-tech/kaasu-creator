<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Kaasu Creator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card" style="max-width:400px;margin:60px auto;">
            <!-- Kaasu-chan greeting -->
            <div style="text-align:center;margin-bottom:20px;">
                <div style="font-size:3rem;">🎀</div>
                <h2 style="color:var(--accent-pink);">Welcome Back!</h2>
                <p style="color:var(--text-secondary);">Kaasu-chan has been waiting for you~</p>
            </div>

            <!-- Error message -->
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <!-- Logout message -->
            <div th:if="${logout}" class="alert alert-success" th:text="${logout}"></div>

            <!-- Account deleted message -->
            <div th:if="${param.deleted}" class="alert alert-success">Your account has been deleted.</div>

            <!-- Login form - Spring Security handles this automatically! -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="username" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;">
                    Login
                </button>
            </form>

            <p style="text-align:center;margin-top:20px;color:var(--text-secondary);">
                Don't have an account? <a href="/register" style="color:var(--accent-cyan);">Register here</a>
            </p>

            <!-- Account settings -->
            <div style="text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.1);">
                <a href="/dashboard" style="color:var(--text-secondary);font-size:0.9rem;">← Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
