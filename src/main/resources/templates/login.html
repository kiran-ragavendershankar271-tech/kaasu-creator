<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Kaasu Creator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">

    <!-- LEFT: empty panel — add a background image here later -->
    <div class="login-left">
        <div class="login-brand">
            <div class="login-brand-icon">💸</div>
            <h1 class="login-brand-name">Kaasu Creator</h1>
            <p class="login-brand-tagline">Track income · Manage budgets · Reach goals</p>
        </div>
    </div>

    <!-- RIGHT: login form -->
    <div class="login-right">
        <div class="login-box">
            <div class="login-header">
                <div class="login-avatar">🎀</div>
                <h2 class="login-title">Welcome Back!</h2>
                <p class="login-sub">Kaasu-chan has been waiting for you~</p>
            </div>

            <div th:if="${error}" class="flash flash-err">
                <span>✕</span><span th:text="${error}"></span>
            </div>
            <div th:if="${logout}" class="flash flash-ok">
                <span>✓</span><span th:text="${logout}"></span>
            </div>
            <div th:if="${param.deleted}" class="flash flash-ok">
                <span>✓</span><span>Your account has been deleted.</span>
            </div>

            <form th:action="@{/login}" method="post" class="login-form">
                <div class="login-field">
                    <label class="login-label">Email</label>
                    <input type="email" name="username" class="login-input" required placeholder="your@email.com">
                </div>
                <div class="login-field">
                    <label class="login-label">Password</label>
                    <input type="password" name="password" class="login-input" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>

            <p class="login-footer-link">
                Don't have an account?
                <a href="/register" style="color:var(--accent-pink)">Register here</a>
            </p>
        </div>
    </div>

</body>
</html>
